      }

      return info;

      const [marksInput, setMarksInput] = useState('');
      const [predCategory, setPredCategory] = useState('UR');
      const [predictionResult, setPredictionResult] = useState(null);

      const dragItem = useRef(null);
      const dragOverItem = useRef(null);

      const filteredPosts = useMemo(() => {
        return postsData.filter(post => {
          if (hideZeroVacancies && post.vacancies[selectedCategory] === 0) return false;
          if (jobTypeFilter !== 'All' && !post.jobType.includes(jobTypeFilter)) return false;
          if (payLevelFilter !== 'All' && post.payLevel.toString() !== payLevelFilter) return false;
          if (cptFilter !== 'All' && post.cpt !== cptFilter) return false;
          if (ageFilter !== 'All' && post.ageLimit !== ageFilter) return false;
          if (colorBlindFilter === 'Suitable Only' && post.colorBlindSuitable === 'NO') return false;
          if (locationFilter !== 'All') {
            if (locationFilter === 'Delhi Only' && !post.posting.includes('Delhi')) return false;
            if (locationFilter === 'All India' && post.posting === 'Delhi') return false; 
          }
          if (searchQuery) {
            const q = searchQuery.toLowerCase();
            if (!post.name.toLowerCase().includes(q) && !post.department.toLowerCase().includes(q) && !post.postCode.toLowerCase().includes(q)) return false;
          }
          return true;
        });
      }, [jobTypeFilter, payLevelFilter, locationFilter, cptFilter, ageFilter, colorBlindFilter, hideZeroVacancies, selectedCategory, searchQuery]);

      const addToPreferences = (post) => {
        if (!preferences.find(p => p.id === post.id)) {
          setPreferences([...preferences, post]);
        }
      };

      const removeFromPreferences = (postId) => {
        setPreferences(preferences.filter(p => p.id !== postId));
      };

      const movePreference = (index, direction) => {
        if (direction === 'up' && index > 0) {
          const newPrefs = [...preferences];
          [newPrefs[index - 1], newPrefs[index]] = [newPrefs[index], newPrefs[index - 1]];
          setPreferences(newPrefs);
        } else if (direction === 'down' && index < preferences.length - 1) {
          const newPrefs = [...preferences];
          [newPrefs[index + 1], newPrefs[index]] = [newPrefs[index], newPrefs[index + 1]];
          setPreferences(newPrefs);
        }
      };

      const handleSort = () => {
        if(dragItem.current === null || dragOverItem.current === null) return;
        
        let _preferences = [...preferences];
        const draggedItemContent = _preferences.splice(dragItem.current, 1)[0];
        _preferences.splice(dragOverItem.current, 0, draggedItemContent);
        
        dragItem.current = null;
        dragOverItem.current = null;
        setPreferences(_preferences);
      };

      const copyToClipboard = () => {
        const text = preferences.map((p, i) => `${i + 1}. [${p.postCode}] ${p.name} (${p.department}) - Level ${p.payLevel}`).join('\n');
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          showToast("Preference list copied to clipboard!", "success");
        } catch (err) {
          showToast("Failed to copy. Please try again.", "error");
        }
        document.body.removeChild(textArea);
      };

      const shareViaWhatsApp = () => {
        if (preferences.length === 0) {
          showToast("Your list is empty! Add posts first.", "error");
          return;
        }
        const text = "My SSC CGL Preference List:\n\n" + preferences.map((p, i) => `${i + 1}. [${p.postCode}] ${p.name} (${p.department})`).join('\n') + "\n\nGenerated via SSC CGL Preference Builder";
        const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
      };

      const toggleCompare = (post) => {
        if (compareList.find(p => p.id === post.id)) {
          setCompareList(compareList.filter(p => p.id !== post.id));
        } else {
          if (compareList.length >= 3) {
            showToast("You can compare up to 3 posts at a time.", "error");
            return;
          }
          setCompareList([...compareList, post]);
        }
      };

      const openPredictor = () => {
        if (preferences.length === 0) {
          showToast("Your list is empty! Add posts first.", "error");
          return;
        }
        setPredCategory(selectedCategory === 'Total' ? 'UR' : selectedCategory);
        setPredictionResult(null);
        setMarksInput('');
        setShowPredictorModal(true);
      };

      const getExpectedCutoff = (post, category) => {
        // 1. High-Tier Exact Historical Data (Using the wider gaps: OBC -15, EWS -20, SC -30, ST -40 from UR)
        const exactCutoffs = {
            'B09': { 'UR': 348, 'OBC': 333, 'EWS': 328, 'SC': 318, 'ST': 308 }, // ASO MEA
            'B17': { 'UR': 348, 'OBC': 333, 'EWS': 328, 'SC': 318, 'ST': 308 }, // ASO AFHQ
            'B01': { 'UR': 338, 'OBC': 323, 'EWS': 318, 'SC': 308, 'ST': 298 }, // Examiner
            'B02': { 'UR': 335, 'OBC': 320, 'EWS': 315, 'SC': 305, 'ST': 295 }, // Preventive Officer
            'B15': { 'UR': 335, 'OBC': 320, 'EWS': 315, 'SC': 305, 'ST': 295 }, // Income Tax Inspector
            'B16': { 'UR': 338, 'OBC': 323, 'EWS': 318, 'SC': 308, 'ST': 298 }, // ASO CSS
            'B04': { 'UR': 322, 'OBC': 307, 'EWS': 302, 'SC': 292, 'ST': 282 }, // GST/Excise Inspector
        };

        if (exactCutoffs[post.postCode]) {
            return exactCutoffs[post.postCode][category];
        }

        // 2. Dynamic Fallback for remaining posts based on lowered Safe Marks mapping
        let baseUR = 285; // Absolute minimum UR cutoff boundary for Level 4 this year

        if (post.payLevel === 7) {
            baseUR = post.jobType === 'Desk' ? 335 : 320; 
        } else if (post.payLevel === 6) {
            baseUR = 310; // e.g., Divisional Accountant / JSO
        } else if (post.payLevel === 5) {
            baseUR = 298; // Auditor / Accountant
        } else if (post.payLevel === 4) {
            baseUR = 285; // Tax Assistant / UDC
        }

        // 3. Apply historical category deduction trends (New Rule: OBC -15, EWS -20, SC -30, ST -40)
        const categoryModifiers = {
            'UR': 0,
            'OBC': -15,
            'EWS': -20,
            'SC': -30,
            'ST': -40
        };

        // Expand the gap slightly more for the absolute lowest level posts (Level 4 & 5) 
        // because the bottom of the spectrum usually has a wider spread in SSC.
        if (post.payLevel <= 5) {
            categoryModifiers['OBC'] = -18;
            categoryModifiers['EWS'] = -22;
            categoryModifiers['SC'] = -35;
            categoryModifiers['ST'] = -45;
        }

        return baseUR + categoryModifiers[category];
      };

      const handlePredict = () => {
        const marks = parseFloat(marksInput);
        if (isNaN(marks) || marks <= 0 || marks > 390) {
          showToast("Please enter valid marks between 1 and 390.", "error");
          return;
        }

        let foundPost = null;
        let appliedCutoff = null;
        
        // Loop through candidate's strict preference order
        for (let post of preferences) {
          const cutoff = getExpectedCutoff(post, predCategory);
          
          if (marks >= cutoff) {
            foundPost = post;
            appliedCutoff = cutoff;
            break; // Stop at the very first post they clear!
          }
        }

        if (foundPost) {
          setPredictionResult({ status: 'success', post: foundPost, cutoff: appliedCutoff });
        } else {
          setPredictionResult({ status: 'fail' });
        }
      };

      const handleSubmission = async (e) => {
        e.preventDefault();
        
        if (preferences.length === 0) {
          showToast("Your preference list is empty! Please add posts first.", "error");
          return;
        }

        setIsSubmitting(true);

        const formattedList = preferences.map((p, i) => `${i + 1}. [${p.postCode}] ${p.name}`).join('\n');
        const payload = {
          name: userName,
          category: selectedCategory,
          total_preferences: preferences.length,
          preferences_list: formattedList
        };

        try {
          const endpoint = "https://formspree.io/f/xreybagp";

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (response.ok) {
            showToast("Success! Your preferences have been submitted.", "success");
            setUserName('');
          } else {
            showToast("Oops! Something went wrong. Try again.", "error");
          }
          
          setIsSubmitting(false);

        } catch (error) {
          showToast("Network error. Please check your connection.", "error");
          setIsSubmitting(false);
        }
      };

      const getSortedCadres = (postId) => {
        if (!cadreDataMap[postId]) return [];
        let cadres = Object.entries(cadreDataMap[postId]).map(([name, vacObj]) => ({ name, count: vacObj[selectedCategory] || 0 }));
        cadres = cadres.filter(c => c.count > 0);
        if (cadreSortType === 'vacancies') {
          cadres.sort((a, b) => b.count - a.count);
        } else if (cadreSortType === 'alphabetical') {
          cadres.sort((a, b) => a.name.localeCompare(b.name));
        } else if (cadreSortType === 'northToSouth') {
          cadres.sort((a, b) => (northToSouthOrder[a.name] || 99) - (northToSouthOrder[b.name] || 99));
        }
        return cadres;
      };

      return (
        <div className="min-h-screen flex flex-col relative z-0">

          {/* Dark Glass Header */}
          <header className="sticky top-0 z-40 bg-slate-900/80 dark:bg-slate-950/90 backdrop-blur-2xl backdrop-saturate-150 border-b border-white/10 dark:border-slate-800 shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
            <div className="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-400 to-indigo-500 flex items-center justify-center text-white shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)] border border-white/20">
                  <i className="fa-solid fa-award text-xl"></i>
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight text-white leading-tight drop-shadow-sm">
                    SSC CGL Preference Builder
                  </h1>
                  <p className="text-blue-200 text-xs mt-0.5 font-medium flex items-center gap-1.5">
                    {selectedCategory === 'Total' ? 'All Categories' : `${selectedCategory} Category`} Vacancies 
                    <span className="bg-white/10 px-2 py-0.5 rounded-full border border-white/10 tracking-wide text-[10px] uppercase shadow-apple-inset dark:shadow-apple-inset-dark">By Abhishek Jorwal</span>
                  </p>
                </div>
              </div>
              
              {/* T20 World Cup Celebration Widget (Header Middle) */}
              <div className="hidden lg:flex relative items-center gap-3 px-6 py-2 bg-slate-800/50 dark:bg-black/20 border border-white/10 dark:border-slate-700/50 rounded-full shadow-apple-inset dark:shadow-apple-inset-dark overflow-hidden group cursor-default">
                {/* Background Glows */}
                <div className="absolute -top-4 -left-4 w-16 h-16 bg-orange-500/30 blur-[15px] rounded-full animate-pulse"></div>
                <div className="absolute -bottom-4 -right-4 w-16 h-16 bg-green-500/30 blur-[15px] rounded-full animate-pulse" style={{ animationDelay: '1s' }}></div>
                
                {/* Fireworks Animation */}
                <div className="absolute top-1 left-4 text-xs animate-ping opacity-75">🎆</div>
                <div className="absolute bottom-1 right-4 text-xs animate-ping opacity-75" style={{animationDelay: '0.4s'}}>🎇</div>
                <div className="absolute top-2 left-1/2 text-[10px] animate-ping opacity-75" style={{animationDelay: '0.8s'}}>✨</div>

                <span className="relative z-10 text-2xl transform group-hover:scale-110 transition-transform duration-300">🏆</span>
                <div className="relative z-10 flex flex-col items-center">
                  <span className="text-sm font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 via-white to-green-400 drop-shadow-sm tracking-wider uppercase leading-none mt-1">
                    T20 Champions
                  </span>
                  <span className="text-[10px] text-slate-300 dark:text-slate-400 font-bold uppercase tracking-widest mt-1">
                    Team India 🇮🇳
                  </span>
                </div>
              </div>

              {/* Glass Tabs & Dark Mode Toggle */}
              <div className="flex items-center gap-3">
                <div className="flex bg-slate-800/50 dark:bg-black/40 p-1 rounded-xl shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] border border-white/5 dark:border-slate-700/50">
                  <button 
                    onClick={() => setActiveTab('browse')}
                    className={`px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${activeTab === 'browse' ? 'bg-white/20 text-white shadow-apple-glass dark:shadow-apple-glass-dark backdrop-blur-md border border-white/20 dark:border-slate-600/30' : 'text-slate-300 hover:text-white hover:bg-white/5'}`}
                  >
                    <i className="fa-solid fa-layer-group mr-2 opacity-80"></i> Browse
                  </button>
                  <button 
                    onClick={() => setActiveTab('preferences')}
                    className={`px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200 flex items-center gap-2 ${activeTab === 'preferences' ? 'bg-white/20 text-white shadow-apple-glass dark:shadow-apple-glass-dark backdrop-blur-md border border-white/20 dark:border-slate-600/30' : 'text-slate-300 hover:text-white hover:bg-white/5'}`}
                  >
                    <i className="fa-solid fa-list-check opacity-80"></i>
                    My List 
                    {preferences.length > 0 && (
                      <span className={`text-[10px] px-2 py-0.5 rounded-full shadow-apple-inset dark:shadow-apple-inset-dark border border-white/20 dark:border-slate-600/30 ml-1 ${activeTab === 'preferences' ? 'bg-white/30 text-white' : 'bg-blue-500 text-white'}`}>
                        {preferences.length}
                      </span>
                    )}
                  </button>
                </div>
                
                {/* Theme Toggle Button */}
                <button 
                  onClick={() => setDarkMode(!darkMode)}
                  className="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-800/50 dark:bg-black/40 hover:bg-slate-700/50 dark:hover:bg-slate-800/80 transition-colors border border-white/5 dark:border-slate-700/50 shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)]"
                  title={darkMode ? "Switch to Light Mode" : "Switch to Dark Mode"}
                >
                  {darkMode ? <i className="fa-solid fa-sun text-yellow-400 text-lg"></i> : <i className="fa-solid fa-moon text-blue-200 text-lg"></i>}
                </button>
              </div>
            </div>
          </header>

          <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-8 sm:px-6 lg:px-8 relative z-10">
            
            {/* Global Toast Notification */}
            {toast.show && (
              <div className={`fixed bottom-6 right-6 z-[100] animate-in slide-in-from-bottom-5 fade-in px-6 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 backdrop-blur-xl border ${toast.type === 'success' ? 'bg-emerald-900/90 border-emerald-500/30' : 'bg-rose-900/90 border-rose-500/30'}`}>
                <i className={`fa-solid ${toast.type === 'success' ? 'fa-circle-check text-emerald-400' : 'fa-circle-exclamation text-rose-400'} text-lg`}></i>
                <span className="font-medium text-white text-sm tracking-wide">{toast.message}</span>
              </div>
            )}

            {activeTab === 'browse' && (
              <div className="flex flex-col lg:flex-row gap-8">
                
                {/* LEFT SIDEBAR: FILTERS */}
                <div className="lg:w-72 flex-shrink-0">
                  <div className="bg-white/50 dark:bg-slate-900/60 backdrop-blur-2xl backdrop-saturate-150 rounded-[2rem] shadow-apple-glass dark:shadow-apple-glass-dark border border-white/80 dark:border-slate-700/80 p-6 sticky top-28">
                    <div className="flex items-center gap-3 mb-6">
                      <div className="w-8 h-8 rounded-xl bg-white/60 dark:bg-slate-800/80 text-blue-600 dark:text-blue-400 flex items-center justify-center border border-white/80 dark:border-slate-700 shadow-apple-inset dark:shadow-apple-inset-dark">
                        <i className="fa-solid fa-sliders text-sm"></i>
                      </div>
                      <h2 className="text-lg font-semibold text-slate-800 dark:text-slate-100">Filters</h2>
                    </div>
                    
                    <div className="space-y-5">
                      {/* Smart Search Bar */}
                      <div>
                        <div className="relative">
                          <i className="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 transform -translate-y-1/2 text-slate-400 dark:text-slate-500 text-sm"></i>
                          <input 
                            type="text" 
                            placeholder="Search Post or Code..." 
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            className="w-full rounded-xl border border-blue-200/50 dark:border-slate-700 py-2.5 pl-9 pr-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white/70 dark:bg-slate-800/70 backdrop-blur-md outline-none transition-all font-medium text-slate-800 dark:text-slate-200 shadow-apple-inset dark:shadow-apple-inset-dark placeholder-slate-400 dark:placeholder-slate-500"
                          />
                        </div>
                      </div>

                      <div>
                        <label className="block text-[11px] font-bold text-slate-800 dark:text-slate-300 uppercase tracking-wider mb-1.5">Candidate Category</label>
                        <select 
                          value={selectedCategory} 
                          onChange={(e) => setSelectedCategory(e.target.value)}
                          className="w-full rounded-xl border border-blue-300/60 dark:border-slate-600 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white/60 dark:bg-slate-800/80 backdrop-blur-md outline-none transition-all cursor-pointer font-bold text-blue-900 dark:text-blue-100 shadow-apple-glass dark:shadow-apple-glass-dark"
                        >
                          <option value="Total">Total Vacancies (All)</option>
                          <option value="UR">UR (Unreserved)</option>
                          <option value="OBC">OBC</option>
                          <option value="SC">SC</option>
                          <option value="ST">ST</option>
                          <option value="EWS">EWS</option>
                        </select>
                      </div>

                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Age Limit</label>
                          <select 
                            value={ageFilter} 
                            onChange={(e) => setAgeFilter(e.target.value)}
                            className="w-full rounded-xl border border-white/60 dark:border-slate-700 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 dark:bg-slate-800/50 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 dark:text-slate-200 shadow-apple-inset dark:shadow-apple-inset-dark"
                          >
                            <option value="All">All Ages</option>
                            <option value="18-27">18-27 yrs</option>
                            <option value="18-30">18-30 yrs</option>
                            <option value="20-30">20-30 yrs</option>
                            <option value="18-32">18-32 yrs</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Color Blind</label>
                          <select 
                            value={colorBlindFilter} 
                            onChange={(e) => setColorBlindFilter(e.target.value)}
                            className="w-full rounded-xl border border-white/60 dark:border-slate-700 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 dark:bg-slate-800/50 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 dark:text-slate-200 shadow-apple-inset dark:shadow-apple-inset-dark"
                          >
                            <option value="All">All Posts</option>
                            <option value="Suitable Only">Suitable</option>
                          </select>
                        </div>
                      </div>

                      <div>
                        <label className="block text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Job Type</label>
                        <select 
                          value={jobTypeFilter} 
                          onChange={(e) => setJobTypeFilter(e.target.value)}
                          className="w-full rounded-xl border border-white/60 dark:border-slate-700 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 dark:bg-slate-800/50 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 dark:text-slate-200 shadow-apple-inset dark:shadow-apple-inset-dark"
                        >
                          <option value="All">All Types</option>
                          <option value="Desk">Desk Job Only</option>
                          <option value="Field">Field Only</option>
                          <option value="Field/Uniform">Field/Uniform</option>
                          <option value="Field/Desk Mix">Field/Desk Mix</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Pay Level</label>
                        <select 
                          value={payLevelFilter} 
                          onChange={(e) => setPayLevelFilter(e.target.value)}
                          className="w-full rounded-xl border border-white/60 dark:border-slate-700 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 dark:bg-slate-800/50 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 dark:text-slate-200 shadow-apple-inset dark:shadow-apple-inset-dark"
                        >
                          <option value="All">All Levels</option>
                          <option value="7">Level 7 (4600 GP)</option>
                          <option value="6">Level 6 (4200 GP)</option>
                          <option value="5">Level 5 (2800 GP)</option>
                          <option value="4">Level 4 (2400 GP)</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Skill Test</label>
                        <select 
                          value={cptFilter} 
                          onChange={(e) => setCptFilter(e.target.value)}
                          className="w-full rounded-xl border border-white/60 dark:border-slate-700 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 dark:bg-slate-800/50 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 dark:text-slate-200 shadow-apple-inset dark:shadow-apple-inset-dark"
                        >
                          <option value="All">All Options</option>
                          <option value="CPT">CPT Required</option>
                          <option value="DEST">DEST Required</option>
                          <option value="NA">No Skill Test (NA)</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Posting Pref</label>
                        <select 
                          value={locationFilter} 
                          onChange={(e) => setLocationFilter(e.target.value)}
                          className="w-full rounded-xl border border-white/60 dark:border-slate-700 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 dark:bg-slate-800/50 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 dark:text-slate-200 shadow-apple-inset dark:shadow-apple-inset-dark"
                        >
                          <option value="All">Anywhere (All India)</option>
                          <option value="Delhi Only">Delhi Region Only</option>
                        </select>
                      </div>

                      <div className="flex items-center mt-4 bg-white/50 dark:bg-slate-800/50 backdrop-blur-md p-3 rounded-xl border border-white/80 dark:border-slate-700 shadow-apple-glass dark:shadow-apple-glass-dark">
                        <input 
                          type="checkbox" 
                          id="hideZero" 
                          checked={hideZeroVacancies} 
                          onChange={(e) => setHideZeroVacancies(e.target.checked)}
                          className="h-4 w-4 text-blue-500 focus:ring-blue-500 border-gray-300 rounded cursor-pointer"
                        />
                        <label htmlFor="hideZero" className="ml-3 block text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer select-none">
                          Hide 0 {selectedCategory} vacancy posts
                        </label>
                      </div>
                    </div>

                    <div className="mt-8 pt-6 border-t border-white/40 dark:border-slate-700">
                      <div className="bg-white/40 dark:bg-slate-800/60 backdrop-blur-lg rounded-xl p-4 border border-white/60 dark:border-slate-700/80 shadow-apple-inset dark:shadow-apple-inset-dark">
                        <p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">{selectedCategory} Vacancies Found</p>
                        <p className="text-3xl font-semibold text-blue-600 dark:text-blue-400 drop-shadow-sm">{filteredPosts.reduce((acc, curr) => acc + curr.vacancies[selectedCategory], 0)}</p>
                      </div>
                    </div>
                  </div>
                </div>

                {/* MAIN CONTENT: POST LIST */}
                <div className="flex-grow">
                  <div className="mb-6 flex justify-between items-center px-2">
                    <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 tracking-tight drop-shadow-sm">Available Posts <span className="text-slate-500 dark:text-slate-400 text-lg font-medium ml-1">({filteredPosts.length})</span></h2>
                  </div>
                  
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                    {filteredPosts.map(post => {
                      const isAdded = preferences.find(p => p.id === post.id);
                      const theme = getJobTypeTheme(post.jobType);
                      const deptIcon = getDeptIcon(post.department);
                      
                      return (
                        <div key={post.id} className={`${theme.bg} rounded-[2rem] shadow-apple-glass dark:shadow-apple-glass-dark ${isAdded ? 'ring-[3px] ring-blue-400/80 dark:ring-blue-500/60 shadow-apple-glass-hover dark:shadow-apple-glass-hover-dark' : theme.border} p-6 hover:-translate-y-1 hover:shadow-apple-glass-hover dark:hover:shadow-apple-glass-hover-dark transition-all duration-300 flex flex-col justify-between relative overflow-hidden group`}>
                          
                          {/* Top-Left Glossy edge simulation */}
                          <div className="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-white/0 via-white dark:via-white/20 to-white/0 opacity-60"></div>
                          
                          {/* Left Color Bar Indicator */}
                          <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${theme.indicator}`}></div>

                          {/* Decorative Background Icon */}
                          <i className={`fa-solid ${deptIcon} absolute -bottom-4 -right-4 text-8xl opacity-[0.03] dark:opacity-[0.05] pointer-events-none ${theme.accent}`}></i>
                          
                          {/* Top Section */}
                          <div className="relative z-10 pl-3">
                            <div className="flex justify-between items-start mb-4 gap-3">
                              
                              <div className="flex-grow pr-2">
                                <div className="flex items-center gap-2 mb-1">
                                  <span className="bg-white/80 dark:bg-slate-800 border border-white/50 dark:border-slate-600 text-slate-700 dark:text-slate-300 text-[10px] font-bold px-2 py-0.5 rounded-lg shadow-apple-inset dark:shadow-apple-inset-dark tracking-widest">{post.postCode}</span>
                                  <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 leading-tight">{post.name}</h3>
                                </div>
                                <p className="text-sm font-medium text-slate-600/80 dark:text-slate-400 flex items-center gap-1.5 line-clamp-1" title={post.department}>
                                  <i className={`fa-solid ${deptIcon} text-slate-400/60 dark:text-slate-500 w-4 text-center`}></i> {post.department}
                                </p>
                              </div>
                              
                              <div className="flex-shrink-0 flex flex-col items-end">
                                <span className="inline-flex items-center bg-white/70 dark:bg-slate-800 backdrop-blur-md text-slate-800 dark:text-slate-200 text-sm font-bold px-3 py-1.5 rounded-xl border border-white/80 dark:border-slate-600 shadow-apple-glass dark:shadow-apple-glass-dark">
                                  {post.vacancies[selectedCategory]} <span className="text-[10px] ml-1 uppercase opacity-60 dark:opacity-80 font-semibold">Posts</span>
                                </span>
                              </div>
                            </div>

                            {/* Alert/Warning Badges: Age, Physical, CB, Cutoff */}
                            <div className="flex flex-wrap gap-2 mt-2 mb-4">
                              <span className={`inline-flex items-center gap-1 text-[10px] font-bold px-2.5 py-1 rounded-full border shadow-sm uppercase tracking-wide ${getCutoffTrend(post.postCode).color}`}>
                                <i className="fa-solid fa-arrow-trend-up opacity-70"></i> {getCutoffTrend(post.postCode).label}
                              </span>
                              <span className="inline-flex items-center gap-1 bg-white/60 dark:bg-slate-800/60 text-slate-700 dark:text-slate-300 text-[10px] font-semibold px-2.5 py-1 rounded-full border border-white/80 dark:border-slate-700 shadow-sm uppercase tracking-wide">
                                <i className="fa-regular fa-clock opacity-60"></i> {post.ageLimit} yrs
                              </span>
                              {post.colorBlindSuitable === 'NO' ? (
                                <span className="inline-flex items-center gap-1 bg-rose-50/80 dark:bg-rose-500/20 backdrop-blur-md text-rose-700 dark:text-rose-300 text-[10px] font-semibold px-2.5 py-1 rounded-full border border-rose-200/80 dark:border-rose-500/30 shadow-sm uppercase tracking-wide">
                                  <i className="fa-solid fa-eye-slash opacity-70"></i> Not for CB
                                </span>
                              ) : (
                                <span className="inline-flex items-center gap-1 bg-emerald-50/80 dark:bg-emerald-500/20 backdrop-blur-md text-emerald-700 dark:text-emerald-300 text-[10px] font-semibold px-2.5 py-1 rounded-full border border-emerald-200/80 dark:border-emerald-500/30 shadow-sm uppercase tracking-wide">
                                  <i className="fa-solid fa-eye opacity-70"></i> CB Suitable
                                </span>
                              )}
                              {post.hasPhysical && (
                                <span className="inline-flex items-center gap-1 bg-amber-50/80 dark:bg-amber-500/20 backdrop-blur-md text-amber-700 dark:text-amber-300 text-[10px] font-semibold px-2.5 py-1 rounded-full border border-amber-200/80 dark:border-amber-500/30 shadow-sm uppercase tracking-wide">
                                  <i className="fa-solid fa-dumbbell opacity-70"></i> Physical Std
                                </span>
                              )}
                            </div>
                            
                            {/* Standard Tags */}
                            <div className="flex flex-wrap gap-2 mt-4">
                              <span className="inline-flex items-center gap-1.5 bg-white/40 dark:bg-slate-800/60 backdrop-blur-md text-slate-700 dark:text-slate-300 text-[11px] font-medium px-2.5 py-1 rounded-xl border border-white/60 dark:border-slate-700 shadow-apple-inset dark:shadow-apple-inset-dark">
                                <i className="fa-solid fa-indian-rupee-sign opacity-40"></i> Lvl {post.payLevel}
                              </span>
                              <span className={`inline-flex items-center gap-1.5 ${theme.badgeBg} ${theme.badgeText} text-[11px] font-medium px-2.5 py-1 rounded-xl`}>
                                <i className="fa-solid fa-briefcase opacity-40"></i> {post.jobType}
                              </span>
                              <span className="inline-flex items-center gap-1.5 bg-white/40 dark:bg-slate-800/60 backdrop-blur-md text-slate-700 dark:text-slate-300 text-[11px] font-medium px-2.5 py-1 rounded-xl border border-white/60 dark:border-slate-700 shadow-apple-inset dark:shadow-apple-inset-dark">
                                <i className="fa-solid fa-keyboard opacity-40"></i> {post.cpt}
                              </span>
                              <span className="inline-flex items-center gap-1.5 bg-white/40 dark:bg-slate-800/60 backdrop-blur-md text-slate-700 dark:text-slate-300 text-[11px] font-medium px-2.5 py-1 rounded-xl border border-white/60 dark:border-slate-700 shadow-apple-inset dark:shadow-apple-inset-dark">
                                <i className="fa-solid fa-location-dot opacity-40"></i> {post.posting}
                              </span>
                            </div>
                          </div>
                          
                          {/* Actions */}
                          <div className="flex gap-3 mt-5 pt-5 border-t border-white/30 dark:border-slate-700/50 relative z-10 pl-3">
                            <button 
                              onClick={() => setProfileModalPost(post)}
                              className="flex-shrink-0 w-10 h-10 bg-white/60 dark:bg-slate-800 backdrop-blur-md hover:bg-white/80 dark:hover:bg-slate-700 text-blue-600 dark:text-blue-400 font-medium rounded-xl transition-all border border-white/80 dark:border-slate-600 shadow-apple-glass dark:shadow-apple-glass-dark flex items-center justify-center"
                              title="View Job Profile & Salary"
                            >
                              <i className="fa-solid fa-circle-info text-lg"></i>
                            </button>

                            <button 
                              onClick={() => toggleCompare(post)}
                              className={`flex-shrink-0 w-10 h-10 backdrop-blur-md font-medium rounded-xl transition-all border shadow-apple-glass dark:shadow-apple-glass-dark flex items-center justify-center ${
                                compareList.find(p => p.id === post.id)
                                  ? 'bg-amber-100 dark:bg-amber-900/40 text-amber-600 dark:text-amber-400 border-amber-300 dark:border-amber-700'
                                  : 'bg-white/60 dark:bg-slate-800 hover:bg-white/80 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 border-white/80 dark:border-slate-600'
                              }`}
                              title={compareList.find(p => p.id === post.id) ? "Remove from Compare" : "Compare this post"}
                            >
                              <i className="fa-solid fa-code-compare text-lg"></i>
                            </button>

                            {post.hasCadreBreakdown && post.vacancies[selectedCategory] > 0 ? (
                              <button 
                                onClick={() => setSelectedPost(post.id)}
                                className="flex-1 bg-white/60 dark:bg-slate-800 backdrop-blur-md hover:bg-white/80 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-medium py-2 rounded-xl text-sm transition-all border border-white/80 dark:border-slate-600 shadow-apple-glass dark:shadow-apple-glass-dark flex items-center justify-center gap-2"
                              >
                                <i className="fa-solid fa-map-location-dot opacity-50"></i> Breakup
                              </button>
                            ) : (
                              <div className="flex-1"></div> 
                            )}
                            
                            <button 
                              onClick={() => isAdded ? removeFromPreferences(post.id) : addToPreferences(post)}
                              className={`flex-1 font-medium py-2 rounded-xl text-sm transition-all flex items-center justify-center gap-2 transform active:scale-95 border ${
                                isAdded 
                                  ? 'bg-white/60 dark:bg-slate-800 backdrop-blur-md text-rose-500 dark:text-rose-400 hover:bg-rose-50/80 dark:hover:bg-rose-900/40 border-white/80 dark:border-slate-600 shadow-apple-glass dark:shadow-apple-glass-dark' 
                                  : 'bg-blue-500/90 dark:bg-blue-600/90 backdrop-blur-md text-white hover:bg-blue-600/90 shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_8px_20px_rgba(59,130,246,0.3)] border-white/20 dark:border-blue-500/30'
                              }`}
                            >
                              {isAdded ? (
                                <><i className="fa-solid fa-minus opacity-80"></i> Remove</>
                              ) : (
                                <><i className="fa-solid fa-plus opacity-80"></i> Add to List</>
                              )}
                            </button>
                          </div>
                        </div>
                      );
                    })}
                    
                    {filteredPosts.length === 0 && (
                      <div className="col-span-full py-16 text-center text-slate-500 dark:text-slate-400 bg-white/50 dark:bg-slate-900/60 backdrop-blur-2xl backdrop-saturate-150 rounded-[2rem] shadow-apple-glass dark:shadow-apple-glass-dark border border-white/80 dark:border-slate-700 flex flex-col items-center justify-center">
                        <div className="w-20 h-20 bg-white/60 dark:bg-slate-800/80 rounded-2xl flex items-center justify-center mb-4 shadow-apple-inset dark:shadow-apple-inset-dark border border-white/80 dark:border-slate-700">
                          <i className="fa-solid fa-magnifying-glass text-3xl text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-1">No matches found</h3>
                        <p className="text-sm">Try adjusting your filters to see more posts.</p>
                        <button onClick={() => {setJobTypeFilter('All'); setPayLevelFilter('All'); setLocationFilter('All'); setCptFilter('All'); setAgeFilter('All'); setColorBlindFilter('All'); setSearchQuery('');}} className="mt-5 bg-white/80 dark:bg-slate-800 border border-white/80 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-medium px-5 py-2.5 rounded-xl shadow-apple-glass dark:shadow-apple-glass-dark hover:bg-white dark:hover:bg-slate-700 transition-all">Reset All Filters</button>
                      </div>
                    )}
                  </div>

                  {/* Floating Compare Action Bar */}
                  {compareList.length > 0 && (
                    <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-4 bg-slate-900/95 dark:bg-slate-950/95 backdrop-blur-xl p-3 pl-5 rounded-2xl shadow-2xl border border-white/10 dark:border-slate-700 w-max max-w-full overflow-hidden animate-in slide-in-from-bottom-10 fade-in">
                      <div className="text-white font-medium text-sm hidden sm:block whitespace-nowrap">
                        <span className="text-amber-400 font-bold">{compareList.length}</span> / 3 Selected
                      </div>
                      <div className="flex gap-2">
                        {compareList.map(p => (
                          <div key={p.id} className="bg-slate-800 border border-slate-700 text-white text-[10px] font-bold px-2 py-1 rounded-lg flex items-center gap-1.5 whitespace-nowrap">
                            {p.postCode}
                            <button onClick={() => toggleCompare(p)} className="text-slate-400 hover:text-rose-400"><i className="fa-solid fa-times"></i></button>
                          </div>
                        ))}
                      </div>
                      <button 
                        onClick={() => setShowCompareModal(true)}
                        disabled={compareList.length < 2}
                        className="ml-2 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed whitespace-nowrap"
                      >
                        Compare
                      </button>
                    </div>
                  )}

                </div>
              </div>
            )}

            {/* PREFERENCE LIST TAB */}
            {activeTab === 'preferences' && (
              <div className="max-w-4xl mx-auto">
                <div className="bg-white/50 dark:bg-slate-900/60 backdrop-blur-2xl backdrop-saturate-150 rounded-[2rem] shadow-apple-glass dark:shadow-apple-glass-dark border border-white/80 dark:border-slate-700 overflow-hidden">
                  <div className="bg-white/40 dark:bg-slate-800/50 border-b border-white/50 dark:border-slate-700 p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                      <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 tracking-tight">Your Preference List</h2>
                      <p className="text-sm text-slate-500 dark:text-slate-400 mt-1 font-medium">Order your selected posts carefully. Top post is highest preference. <span className="inline-block bg-emerald-100/60 dark:bg-emerald-500/20 text-emerald-700 dark:text-emerald-400 text-[10px] px-2 py-0.5 rounded-lg font-semibold ml-1 uppercase tracking-wider border border-emerald-200/50 dark:border-emerald-500/30 shadow-sm"><i className="fa-solid fa-cloud-arrow-up mr-1"></i>Auto-saved</span></p>
                    </div>
                    
                    {/* Submission / Copy / Predict Controls */}
                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 sm:gap-3 w-full md:w-auto mt-2 md:mt-0 flex-wrap justify-end">
                      
                      <form onSubmit={handleSubmission} className="flex gap-2 w-full sm:w-auto">
                        <input 
                          type="text" 
                          placeholder="Your Name" 
                          required
                          value={userName}
                          onChange={(e) => setUserName(e.target.value)}
                          className="bg-white/60 dark:bg-slate-800 border border-white/80 dark:border-slate-700 shadow-apple-inset dark:shadow-apple-inset-dark rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 w-full sm:w-40 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500"
                        />
                        <button 
                          type="submit"
                          disabled={isSubmitting}
                          className="flex items-center justify-center gap-2 bg-blue-500/90 dark:bg-blue-600/90 backdrop-blur-md text-white hover:bg-blue-600/90 shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_8px_20px_rgba(59,130,246,0.3)] transition-all transform active:scale-95 border border-white/20 dark:border-blue-500/30 px-5 py-2.5 rounded-xl text-sm font-medium whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                          {isSubmitting ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-paper-plane opacity-80"></i>} 
                          {isSubmitting ? 'Sending...' : 'Submit'}
                        </button>
                      </form>

                      <button 
                        onClick={openPredictor}
                        className="flex items-center justify-center gap-2 bg-indigo-500/90 dark:bg-indigo-600/90 backdrop-blur-md text-white hover:bg-indigo-600/90 dark:hover:bg-indigo-500/90 px-4 py-2.5 rounded-xl text-sm font-medium shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_8px_20px_rgba(99,102,241,0.3)] transition-all transform active:scale-95 border border-white/20 dark:border-indigo-400/30 whitespace-nowrap"
                      >
                        <i className="fa-solid fa-wand-magic-sparkles"></i> Predict
                      </button>

                      <button 
                        onClick={copyToClipboard}
                        className="flex items-center justify-center gap-2 bg-slate-800/90 dark:bg-slate-700/90 backdrop-blur-md text-white hover:bg-slate-900/90 dark:hover:bg-slate-600/90 px-4 py-2.5 rounded-xl text-sm font-medium shadow-[inset_0_1px_1px_rgba(255,255,255,0.3),0_8px_20px_rgba(0,0,0,0.1)] transition-all transform active:scale-95 border border-white/10 dark:border-slate-600/50 whitespace-nowrap"
                      >
                        <i className="fa-regular fa-copy opacity-80"></i> Copy
                      </button>

                      <button 
                        onClick={shareViaWhatsApp}
                        className="flex items-center justify-center gap-2 bg-emerald-500/90 dark:bg-emerald-600/90 backdrop-blur-md text-white hover:bg-emerald-600/90 dark:hover:bg-emerald-500/90 px-4 py-2.5 rounded-xl text-sm font-medium shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_8px_20px_rgba(16,185,129,0.3)] transition-all transform active:scale-95 border border-white/20 dark:border-emerald-400/30 whitespace-nowrap"
                      >
                        <i className="fa-brands fa-whatsapp text-lg"></i> Share
                      </button>
                      
                      {preferences.length > 0 && (
                        <button 
                          onClick={() => setShowClearConfirm(true)}
                          className="flex items-center justify-center gap-2 bg-rose-50/80 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 hover:bg-rose-100 dark:hover:bg-rose-500/20 px-3 py-2.5 rounded-xl text-sm font-medium border border-rose-200/50 dark:border-rose-500/30 transition-all transform active:scale-95 whitespace-nowrap ml-1 mt-2 sm:mt-0"
                          title="Clear All Preferences"
                        >
                          <i className="fa-solid fa-trash-can"></i>
                        </button>
                      )}
                    </div>
                  </div>

                  <div className="p-6">
                    {preferences.length > 0 && (
                      <div className="mb-6 grid grid-cols-3 gap-4 bg-white/40 dark:bg-slate-800/60 p-4 rounded-2xl border border-white/60 dark:border-slate-700 shadow-apple-inset dark:shadow-apple-inset-dark">
                        <div className="text-center border-r border-white/50 dark:border-slate-700">
                          <p className="text-[10px] uppercase font-bold text-slate-500 dark:text-slate-400 tracking-wider">Avg Pay Level</p>
                          <p className="text-xl font-black text-blue-600 dark:text-blue-400 mt-0.5">{(preferences.reduce((acc, p) => acc + p.payLevel, 0) / preferences.length).toFixed(1)}</p>
                        </div>
                        <div className="text-center border-r border-white/50 dark:border-slate-700">
                          <p className="text-[10px] uppercase font-bold text-slate-500 dark:text-slate-400 tracking-wider">Desk Jobs</p>
                          <p className="text-xl font-black text-emerald-600 dark:text-emerald-400 mt-0.5">{preferences.filter(p => p.jobType === 'Desk').length}</p>
                        </div>
                        <div className="text-center">
                          <p className="text-[10px] uppercase font-bold text-slate-500 dark:text-slate-400 tracking-wider">Field Jobs</p>
                          <p className="text-xl font-black text-orange-600 dark:text-orange-400 mt-0.5">{preferences.filter(p => p.jobType !== 'Desk').length}</p>
                        </div>
                      </div>
                    )}

                    {preferences.length === 0 ? (
                      <div className="text-center py-16 flex flex-col items-center">
                        <div className="inline-flex items-center justify-center w-24 h-24 rounded-3xl bg-white/60 dark:bg-slate-800/80 backdrop-blur-md border border-white/80 dark:border-slate-700 shadow-apple-inset dark:shadow-apple-inset-dark mb-6">
                          <i className="fa-solid fa-list-check text-4xl text-blue-500 dark:text-blue-400 opacity-80"></i>
                        </div>
                        <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 mb-2">Your list is empty</h3>
                        <p className="text-slate-500 dark:text-slate-400 font-medium max-w-sm mx-auto mb-8">Go back to the Browse tab and add posts you are interested in applying for.</p>
                        <button 
                          onClick={() => setActiveTab('browse')}
                          className="bg-blue-500/90 dark:bg-blue-600/90 backdrop-blur-md border border-white/20 dark:border-blue-500/30 text-white px-8 py-3 rounded-2xl font-medium hover:bg-blue-600/90 shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_8px_20px_rgba(59,130,246,0.3)] transition-all transform active:scale-95"
                        >
                          <i className="fa-solid fa-layer-group mr-2 opacity-80"></i> Browse Posts
                        </button>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        <div className="text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-4 px-2 flex items-center gap-2 bg-white/40 dark:bg-slate-800/50 backdrop-blur-md py-2 rounded-xl border border-white/60 dark:border-slate-700 justify-center shadow-apple-inset dark:shadow-apple-inset-dark">
                          <i className="fa-solid fa-hand-pointer text-blue-500 dark:text-blue-400 opacity-80"></i> Drag and drop rows to set your exact priority order
                        </div>
                        
                        <div className="space-y-3 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar pb-4">
                          {preferences.map((post, index) => {
                            const theme = getJobTypeTheme(post.jobType);
                            const deptIcon = getDeptIcon(post.department);
                            
                            return (
                              <div 
                                key={post.id} 
                                draggable
                                onDragStart={(e) => (dragItem.current = index)}
                                onDragEnter={(e) => (dragOverItem.current = index)}
                                onDragEnd={handleSort}
                                onDragOver={(e) => e.preventDefault()}
                                className={`flex items-center gap-4 p-4 ${theme.bg} border ${theme.border} rounded-[1.5rem] hover:shadow-apple-glass dark:hover:shadow-apple-glass-dark transition-all group relative overflow-hidden cursor-grab active:cursor-grabbing border-l-[6px] ${theme.border.replace('border-', 'border-l-')} ${theme.indicator.replace('bg-', 'border-l-')}`}
                              >
                                <div className="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-white/0 via-white dark:via-white/20 to-white/0 opacity-60"></div>

                                <div className="flex-shrink-0 flex items-center gap-3 relative z-10 w-16">
                                  <i className="fa-solid fa-grip-vertical text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 cursor-grab px-1 transition-colors"></i>
                                  <div className="w-8 h-8 rounded-full bg-white/80 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold text-sm shadow-apple-inset dark:shadow-apple-inset-dark flex items-center justify-center border border-white/60 dark:border-slate-700">

                                </button>
                              </div>
                            </div>

                          </td>
                        </tr>

                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </div>

          {showClearConfirm && (

                <div className="w-16 h-16 bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-200 dark:border-rose-800 shadow-sm">

                </div>

                  <div className="grid grid-cols-2 md:grid-cols-4 divide-x divide-slate-200 dark:divide-slate-700/50">
                    <div className="p-4 bg-slate-50/50 dark:bg-slate-800/30 hidden md:block">
                      <div className="space-y-6 text-sm font-semibold text-slate-500 dark:text-slate-400 text-right pr-2 pt-[140px]">
                        <div className="py-2 border-b border-transparent">Department</div>
                        <div className="py-2 border-b border-transparent">Total Vacancies</div>
                        <div className="py-2 border-b border-transparent">Pay Level</div>
                        <div className="py-2 border-b border-transparent">Est. Salary (X-City)</div>
                        <div className="py-2 border-b border-transparent">Job Type</div>
                        <div className="py-2 border-b border-transparent">Posting</div>
                        <div className="py-2 border-b border-transparent">Age Limit</div>
                        <div className="py-2 border-b border-transparent">Color Blind</div>
                        <div className="py-2 border-b border-transparent">Physical Std</div>
                      </div>
                    </div>

                    {compareList.map(post => (
                      <div key={post.id} className="p-4">
                        <div className="h-[120px] flex flex-col justify-end border-b border-slate-200 dark:border-slate-700 pb-4 mb-6">
                          <span className="bg-slate-800 dark:bg-slate-700 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm w-max mb-2">{post.postCode}</span>
                          <h4 className="font-bold text-slate-800 dark:text-slate-100 leading-tight text-lg">{post.name}</h4>
                        </div>
                        
                        <div className="space-y-6 text-sm font-medium text-slate-800 dark:text-slate-200">
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800 truncate" title={post.department}>
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5">Department</span>
                            {post.department}
                          </div>
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800 font-bold text-blue-600 dark:text-blue-400">
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5 font-medium">Vacancies</span>
                            {post.vacancies[selectedCategory]}
                          </div>
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800">
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5">Pay Level</span>
                            Level {post.payLevel}
                          </div>
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800 font-bold text-emerald-600 dark:text-emerald-400">
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5 font-medium">Est. Salary</span>
                            {getEstimatedSalary(post.payLevel).x}
                          </div>
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800">
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5">Job Type</span>
                            {post.jobType}
                          </div>
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800">
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5">Posting</span>
                            {post.posting}
                          </div>
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800">
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5">Age Limit</span>
                            {post.ageLimit} yrs
                          </div>
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800">
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5">Color Blind</span>
                            {post.colorBlindSuitable === 'YES' ? <span className="text-emerald-600"><i className="fa-solid fa-check mr-1"></i> Suitable</span> : <span className="text-rose-600"><i className="fa-solid fa-times mr-1"></i> Not Suitable</span>}
                          </div>
                          <div className="py-2 border-b border-slate-100 dark:border-slate-800">
                            <span className="md:hidden text-xs text-slate-400 block mb-0.5">Physical Std</span>
                            {post.hasPhysical ? <span className="text-rose-600"><i className="fa-solid fa-dumbbell mr-1"></i> Required</span> : <span className="text-slate-500">Not Required</span>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* PREDICTOR MODAL */}
          {showPredictorModal && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-md z-[70] flex items-center justify-center p-4 transition-opacity">
              <div className="bg-white/90 dark:bg-slate-900/95 backdrop-blur-2xl backdrop-saturate-150 rounded-[2rem] shadow-apple-glass dark:shadow-apple-glass-dark border border-white dark:border-slate-700/80 w-full max-w-md p-6 animate-in fade-in zoom-in duration-200 flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-6 flex-shrink-0">
                  <h3 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2">
                    <i className="fa-solid fa-wand-magic-sparkles text-indigo-500"></i> AI Post Predictor
                  </h3>
                  <button onClick={() => setShowPredictorModal(false)} className="w-8 h-8 flex items-center justify-center text-slate-400 dark:text-slate-500 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors shadow-sm border border-white dark:border-slate-700">
                    <i className="fa-solid fa-times"></i>
                  </button>
                </div>

                <div className="space-y-4 overflow-y-auto custom-scrollbar pr-1">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Candidate Category</label>
                    <select 
                      value={predCategory} 
                      onChange={(e) => setPredCategory(e.target.value)}
                      className="w-full rounded-xl border border-slate-200 dark:border-slate-700 py-2.5 px-3 text-sm focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 shadow-sm outline-none cursor-pointer"
                    >
                      <option value="UR">UR (Unreserved)</option>
                      <option value="OBC">OBC</option>
                      <option value="EWS">EWS</option>
                      <option value="SC">SC</option>
                      <option value="ST">ST</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Expected Marks (Out of 390)</label>
                    <input 
                      type="number" 
                      placeholder="e.g. 315" 
                      value={marksInput}
                      onChange={(e) => setMarksInput(e.target.value)}
                      className="w-full rounded-xl border border-slate-200 dark:border-slate-700 py-3 px-4 text-lg font-bold focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 shadow-sm outline-none placeholder-slate-300 dark:placeholder-slate-600"
                      max="390"
                      min="0"
                    />
                  </div>

                  <button 
                    onClick={handlePredict}
                    className="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-500/30 transition-all transform active:scale-95 mt-2"
                  >
                    Predict My Allocation
                  </button>

                  {/* Results */}
                  {predictionResult && (
                    <div className={`mt-6 p-5 rounded-2xl border animate-in slide-in-from-bottom-4 fade-in ${predictionResult.status === 'success' ? 'bg-emerald-50/80 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800/50' : 'bg-amber-50/80 dark:bg-amber-900/20 border-amber-200 dark:border-amber-800/50'}`}>
                      {predictionResult.status === 'success' ? (
                        <>
                          <h4 className="text-emerald-700 dark:text-emerald-400 font-bold mb-2 flex items-center gap-2">
                            <i className="fa-solid fa-champagne-glasses"></i> Expected Allocation
                          </h4>
                          <p className="text-sm text-slate-600 dark:text-slate-400 mb-3">Based on your preference order and expected cutoffs, you might get:</p>
                          <div className="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-emerald-100 dark:border-emerald-700/50 flex flex-col gap-1.5">
                            <div className="flex items-center gap-2">
                              <span className="bg-slate-800 dark:bg-slate-700 text-white text-[10px] font-bold px-2 py-0.5 rounded tracking-widest shadow-sm">{predictionResult.post.postCode}</span>
                              <span className="font-bold text-slate-800 dark:text-slate-100">{predictionResult.post.name}</span>
                            </div>
                            <span className="text-xs font-medium text-slate-500 dark:text-slate-400 pl-1"><i className={`fa-solid ${getDeptIcon(predictionResult.post.department)} opacity-50 mr-1`}></i> {predictionResult.post.department}</span>
                            <div className="mt-2 text-[11px] bg-emerald-50 dark:bg-emerald-900/40 text-emerald-800 dark:text-emerald-300 p-2 rounded-lg border border-emerald-100 dark:border-emerald-700/50 flex justify-between items-center">
                              <span>Predicted Cutoff for {predictionResult.post.postCode}:</span>
                              <span className="font-black text-sm">{predictionResult.cutoff} marks</span>
                            </div>
                          </div>
                          <p className="text-[10px] text-emerald-600 dark:text-emerald-500 mt-3 text-center opacity-80">*Based on expected lower cutoffs due to high vacancies & tougher paper this year.</p>
                        </>
                      ) : (
                        <>
                          <h4 className="text-amber-700 dark:text-amber-400 font-bold mb-2 flex items-center gap-2">
                            <i className="fa-solid fa-triangle-exclamation"></i> Marks Might Fall Short
                          </h4>
                          <p className="text-sm text-amber-800 dark:text-amber-200">
                            Based on expected cutoffs, your marks may not be enough for the posts currently in your preference list. 
                            <br/><br/>
                            <strong>Pro Tip:</strong> Add more posts with historical low cutoffs (like Tax Assistant or UDC) to the bottom of your list to be safe!
                          </p>
                        </>
                      )}
                    </div>
                  )}

                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
