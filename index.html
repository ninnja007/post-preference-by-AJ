      const [colorBlindFilter, setColorBlindFilter] = useState('All');
      const [hideZeroVacancies, setHideZeroVacancies] = useState(true);

      const [preferences, setPreferences] = useState(() => {
        const savedPrefs = localStorage.getItem('ssc_cgl_prefs_st');
        return savedPrefs ? JSON.parse(savedPrefs) : [];
      });

      // Submit Form State
      const [userName, setUserName] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitMessage, setSubmitMessage] = useState('');

      useEffect(() => {
        localStorage.setItem('ssc_cgl_prefs_st', JSON.stringify(preferences));
      }, [preferences]);
      
      const [selectedPost, setSelectedPost] = useState(null);
      const [cadreSortType, setCadreSortType] = useState('vacancies');

      const dragItem = useRef(null);
      const dragOverItem = useRef(null);

      const filteredPosts = useMemo(() => {
        return postsData.filter(post => {
          if (hideZeroVacancies && post.vacancies[selectedCategory] === 0) return false;
          if (jobTypeFilter !== 'All' && !post.jobType.includes(jobTypeFilter)) return false;
          if (payLevelFilter !== 'All' && post.payLevel.toString() !== payLevelFilter) return false;
          if (cptFilter !== 'All' && post.cpt !== cptFilter) return false;
          if (ageFilter !== 'All' && post.ageLimit !== ageFilter) return false;
          if (colorBlindFilter === 'Suitable Only' && post.colorBlindSuitable === 'NO') return false;
          if (locationFilter !== 'All') {
            if (locationFilter === 'Delhi Only' && !post.posting.includes('Delhi')) return false;
            if (locationFilter === 'All India' && post.posting === 'Delhi') return false; 
          }
          return true;
        });
      }, [jobTypeFilter, payLevelFilter, locationFilter, cptFilter, ageFilter, colorBlindFilter, hideZeroVacancies, selectedCategory]);

      const addToPreferences = (post) => {
        if (!preferences.find(p => p.id === post.id)) {
          setPreferences([...preferences, post]);
        }
      };

      const removeFromPreferences = (postId) => {
        setPreferences(preferences.filter(p => p.id !== postId));
      };

      const movePreference = (index, direction) => {
        if (direction === 'up' && index > 0) {
          const newPrefs = [...preferences];
          [newPrefs[index - 1], newPrefs[index]] = [newPrefs[index], newPrefs[index - 1]];
          setPreferences(newPrefs);
        } else if (direction === 'down' && index < preferences.length - 1) {
          const newPrefs = [...preferences];
          [newPrefs[index + 1], newPrefs[index]] = [newPrefs[index], newPrefs[index + 1]];
          setPreferences(newPrefs);
        }
      };

      const handleSort = () => {
        if(dragItem.current === null || dragOverItem.current === null) return;
        
        let _preferences = [...preferences];
        const draggedItemContent = _preferences.splice(dragItem.current, 1)[0];
        _preferences.splice(dragOverItem.current, 0, draggedItemContent);
        
        dragItem.current = null;
        dragOverItem.current = null;
        setPreferences(_preferences);
      };

      const copyToClipboard = () => {
        const text = preferences.map((p, i) => `${i + 1}. [${p.postCode}] ${p.name} (${p.department}) - Level ${p.payLevel}`).join('\n');
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          alert("Preference list copied to clipboard! Paste it wherever you need it.");
        } catch (err) {
          console.error('Oops, unable to copy', err);
          alert("Failed to copy. Please select the text manually.");
        }
        document.body.removeChild(textArea);
      };

      const handleSubmission = async (e) => {
        e.preventDefault();
        
        if (preferences.length === 0) {
          alert("Your preference list is empty! Please add posts first.");
          return;
        }

        setIsSubmitting(true);
        setSubmitMessage('');

        const formattedList = preferences.map((p, i) => `${i + 1}. [${p.postCode}] ${p.name}`).join('\n');
        const payload = {
          name: userName,
          category: selectedCategory,
          total_preferences: preferences.length,
          preferences_list: formattedList
        };

        try {
          const endpoint = "https://formspree.io/f/xreybagp";

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (response.ok) {
            setSubmitMessage("Success! Your preferences have been submitted.");
            setUserName('');
          } else {
            setSubmitMessage("Oops! Something went wrong. Try again.");
          }
          
          setIsSubmitting(false);

        } catch (error) {
          console.error("Submission error:", error);
          setSubmitMessage("Network error. Please check your connection.");
          setIsSubmitting(false);
        }
      };

      const getSortedCadres = (postId) => {
        if (!cadreDataMap[postId]) return [];
        let cadres = Object.entries(cadreDataMap[postId]).map(([name, vacObj]) => ({ name, count: vacObj[selectedCategory] || 0 }));
        cadres = cadres.filter(c => c.count > 0);
        if (cadreSortType === 'vacancies') {
          cadres.sort((a, b) => b.count - a.count);
        } else if (cadreSortType === 'alphabetical') {
          cadres.sort((a, b) => a.name.localeCompare(b.name));
        } else if (cadreSortType === 'northToSouth') {
          cadres.sort((a, b) => (northToSouthOrder[a.name] || 99) - (northToSouthOrder[b.name] || 99));
        }
        return cadres;
      };

      return (
        <div className="min-h-screen flex flex-col relative z-0">

                    SSC CGL Preference Builder
                  </h1>
                  <p className="text-blue-200 text-xs mt-0.5 font-medium flex items-center gap-1.5">
                    {selectedCategory === 'Total' ? 'All Categories' : `${selectedCategory} Category`} Vacancies

                  onClick={() => setActiveTab('browse')}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${activeTab === 'browse' ? 'bg-white/20 text-white shadow-apple-glass backdrop-blur-md border border-white/20' : 'text-slate-300 hover:text-white hover:bg-white/5'}`}

            </div>
          </header>

          <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-8 sm:px-6 lg:px-8 relative z-10">
            
            {activeTab === 'browse' && (
              <div className="flex flex-col lg:flex-row gap-8">
                
                {/* LEFT SIDEBAR: FILTERS */}
                <div className="lg:w-72 flex-shrink-0">
                  <div className="bg-white/50 backdrop-blur-2xl backdrop-saturate-150 rounded-[2rem] shadow-apple-glass border border-white/80 p-6 sticky top-28">
                    <div className="flex items-center gap-3 mb-6">
                      <div className="w-8 h-8 rounded-xl bg-white/60 text-blue-600 flex items-center justify-center border border-white/80 shadow-apple-inset">
                        <i className="fa-solid fa-sliders text-sm"></i>
                      </div>
                      <h2 className="text-lg font-semibold text-slate-800">Filters</h2>
                    </div>
                    
                    <div className="space-y-5">
                      <div>
                        <label className="block text-[11px] font-bold text-slate-800 uppercase tracking-wider mb-1.5">Candidate Category</label>
                        <select 
                          value={selectedCategory} 
                          onChange={(e) => setSelectedCategory(e.target.value)}
                          className="w-full rounded-xl border border-blue-300/60 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white/60 backdrop-blur-md outline-none transition-all cursor-pointer font-bold text-blue-900 shadow-apple-glass"
                        >
                          <option value="Total">Total Vacancies (All)</option>
                          <option value="UR">UR (Unreserved)</option>
                          <option value="OBC">OBC</option>
                          <option value="SC">SC</option>
                          <option value="ST">ST</option>
                          <option value="EWS">EWS</option>
                        </select>
                      </div>

                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Age Limit</label>
                          <select 
                            value={ageFilter} 
                            onChange={(e) => setAgeFilter(e.target.value)}
                            className="w-full rounded-xl border border-white/60 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 shadow-apple-inset"
                          >
                            <option value="All">All Ages</option>
                            <option value="18-27">18-27 yrs</option>
                            <option value="18-30">18-30 yrs</option>
                            <option value="20-30">20-30 yrs</option>
                            <option value="18-32">18-32 yrs</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Color Blind</label>
                          <select 
                            value={colorBlindFilter} 
                            onChange={(e) => setColorBlindFilter(e.target.value)}
                            className="w-full rounded-xl border border-white/60 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 shadow-apple-inset"
                          >
                            <option value="All">All Posts</option>
                            <option value="Suitable Only">Suitable</option>
                          </select>
                        </div>
                      </div>

                      <div>
                        <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Job Type</label>
                        <select 
                          value={jobTypeFilter} 
                          onChange={(e) => setJobTypeFilter(e.target.value)}
                          className="w-full rounded-xl border border-white/60 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 shadow-apple-inset"
                        >
                          <option value="All">All Types</option>
                          <option value="Desk">Desk Job Only</option>
                          <option value="Field">Field Only</option>
                          <option value="Field/Uniform">Field/Uniform</option>
                          <option value="Field/Desk Mix">Field/Desk Mix</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Pay Level</label>
                        <select 
                          value={payLevelFilter} 
                          onChange={(e) => setPayLevelFilter(e.target.value)}
                          className="w-full rounded-xl border border-white/60 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 shadow-apple-inset"
                        >
                          <option value="All">All Levels</option>
                          <option value="7">Level 7 (4600 GP)</option>
                          <option value="6">Level 6 (4200 GP)</option>
                          <option value="5">Level 5 (2800 GP)</option>
                          <option value="4">Level 4 (2400 GP)</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Skill Test</label>
                        <select 
                          value={cptFilter} 
                          onChange={(e) => setCptFilter(e.target.value)}
                          className="w-full rounded-xl border border-white/60 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 shadow-apple-inset"
                        >
                          <option value="All">All Options</option>
                          <option value="CPT">CPT Required</option>
                          <option value="DEST">DEST Required</option>
                          <option value="NA">No Skill Test (NA)</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Posting Pref</label>
                        <select 
                          value={locationFilter} 
                          onChange={(e) => setLocationFilter(e.target.value)}
                          className="w-full rounded-xl border border-white/60 py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/40 backdrop-blur-md outline-none transition-all cursor-pointer font-medium text-slate-700 shadow-apple-inset"
                        >
                          <option value="All">Anywhere (All India)</option>
                          <option value="Delhi Only">Delhi Region Only</option>
                        </select>
                      </div>

                      <div className="flex items-center mt-4 bg-white/50 backdrop-blur-md p-3 rounded-xl border border-white/80 shadow-apple-glass">
                        <input 
                          type="checkbox" 
                          id="hideZero" 
                          checked={hideZeroVacancies} 
                          onChange={(e) => setHideZeroVacancies(e.target.checked)}
                          className="h-4 w-4 text-blue-500 focus:ring-blue-500 border-gray-300 rounded cursor-pointer"
                        />
                        <label htmlFor="hideZero" className="ml-3 block text-sm font-medium text-slate-700 cursor-pointer select-none">
                          Hide 0 {selectedCategory} vacancy posts
                        </label>
                      </div>
                    </div>

                    <div className="mt-8 pt-6 border-t border-white/40">
                      <div className="bg-white/40 backdrop-blur-lg rounded-xl p-4 border border-white/60 shadow-apple-inset">
                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">{selectedCategory} Vacancies Found</p>
                        <p className="text-3xl font-semibold text-blue-600 drop-shadow-sm">{filteredPosts.reduce((acc, curr) => acc + curr.vacancies[selectedCategory], 0)}</p>
                      </div>
                    </div>
                  </div>
                </div>

                {/* MAIN CONTENT: POST LIST */}
                <div className="flex-grow">
                  <div className="mb-6 flex justify-between items-center px-2">
                    <h2 className="text-2xl font-bold text-slate-800 tracking-tight drop-shadow-sm">Available Posts <span className="text-slate-500 text-lg font-medium ml-1">({filteredPosts.length})</span></h2>
                  </div>
                  
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                    {filteredPosts.map(post => {
                      const isAdded = preferences.find(p => p.id === post.id);
                      const theme = getJobTypeTheme(post.jobType);
                      const deptIcon = getDeptIcon(post.department);
                      
                      return (
                        <div key={post.id} className={`${theme.bg} rounded-[2rem] shadow-apple-glass ${isAdded ? 'ring-[3px] ring-blue-400/80 shadow-apple-glass-hover' : theme.border} p-6 hover:-translate-y-1 hover:shadow-apple-glass-hover transition-all duration-300 flex flex-col justify-between relative overflow-hidden group`}>
                          
                          {/* Top-Left Glossy edge simulation */}
                          <div className="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-white/0 via-white to-white/0 opacity-60"></div>
                          
                          {/* Left Color Bar Indicator */}
                          <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${theme.indicator}`}></div>

                          {/* Decorative Background Icon */}
                          <i className={`fa-solid ${deptIcon} absolute -bottom-4 -right-4 text-8xl opacity-[0.03] pointer-events-none ${theme.accent}`}></i>
                          
                          {/* Top Section */}
                          <div className="relative z-10 pl-3">
                            <div className="flex justify-between items-start mb-4 gap-3">
                              
                              <div className="flex-grow pr-2">
                                <div className="flex items-center gap-2 mb-1">
                                  <span className="bg-white/80 border border-white/50 text-slate-700 text-[10px] font-bold px-2 py-0.5 rounded-lg shadow-apple-inset tracking-widest">{post.postCode}</span>
                                  <h3 className="text-xl font-semibold text-slate-800 leading-tight">{post.name}</h3>
                                </div>
                                <p className="text-sm font-medium text-slate-600/80 flex items-center gap-1.5 line-clamp-1" title={post.department}>
                                  <i className={`fa-solid ${deptIcon} text-slate-400/60 w-4 text-center`}></i> {post.department}
                                </p>
                              </div>
                              
                              <div className="flex-shrink-0 flex flex-col items-end">
                                <span className="inline-flex items-center bg-white/70 backdrop-blur-md text-slate-800 text-sm font-bold px-3 py-1.5 rounded-xl border border-white/80 shadow-apple-glass">
                                  {post.vacancies[selectedCategory]} <span className="text-[10px] ml-1 uppercase opacity-60 font-semibold">Posts</span>
                                </span>
                              </div>
                            </div>

                            {/* Alert/Warning Badges: Age, Physical, CB */}
                            <div className="flex flex-wrap gap-2 mt-2 mb-4">
                              <span className="inline-flex items-center gap-1 bg-white/60 text-slate-700 text-[10px] font-semibold px-2.5 py-1 rounded-full border border-white/80 shadow-sm uppercase tracking-wide">
                                <i className="fa-regular fa-clock opacity-60"></i> {post.ageLimit} yrs
                              </span>
                              {post.colorBlindSuitable === 'NO' ? (
                                <span className="inline-flex items-center gap-1 bg-rose-50/80 backdrop-blur-md text-rose-700 text-[10px] font-semibold px-2.5 py-1 rounded-full border border-rose-200/80 shadow-sm uppercase tracking-wide">
                                  <i className="fa-solid fa-eye-slash opacity-70"></i> Not for CB
                                </span>
                              ) : (
                                <span className="inline-flex items-center gap-1 bg-emerald-50/80 backdrop-blur-md text-emerald-700 text-[10px] font-semibold px-2.5 py-1 rounded-full border border-emerald-200/80 shadow-sm uppercase tracking-wide">
                                  <i className="fa-solid fa-eye opacity-70"></i> CB Suitable
                                </span>
                              )}
                              {post.hasPhysical && (
                                <span className="inline-flex items-center gap-1 bg-amber-50/80 backdrop-blur-md text-amber-700 text-[10px] font-semibold px-2.5 py-1 rounded-full border border-amber-200/80 shadow-sm uppercase tracking-wide">
                                  <i className="fa-solid fa-dumbbell opacity-70"></i> Physical Std
                                </span>
                              )}
                            </div>
                            
                            {/* Standard Tags */}
                            <div className="flex flex-wrap gap-2 mt-4">
                              <span className="inline-flex items-center gap-1.5 bg-white/40 backdrop-blur-md text-slate-700 text-[11px] font-medium px-2.5 py-1 rounded-xl border border-white/60 shadow-apple-inset">
                                <i className="fa-solid fa-indian-rupee-sign opacity-40"></i> Lvl {post.payLevel}
                              </span>
                              <span className={`inline-flex items-center gap-1.5 ${theme.badgeBg} ${theme.badgeText} text-[11px] font-medium px-2.5 py-1 rounded-xl`}>
                                <i className="fa-solid fa-briefcase opacity-40"></i> {post.jobType}
                              </span>
                              <span className="inline-flex items-center gap-1.5 bg-white/40 backdrop-blur-md text-slate-700 text-[11px] font-medium px-2.5 py-1 rounded-xl border border-white/60 shadow-apple-inset">
                                <i className="fa-solid fa-keyboard opacity-40"></i> {post.cpt}
                              </span>
                              <span className="inline-flex items-center gap-1.5 bg-white/40 backdrop-blur-md text-slate-700 text-[11px] font-medium px-2.5 py-1 rounded-xl border border-white/60 shadow-apple-inset">
                                <i className="fa-solid fa-location-dot opacity-40"></i> {post.posting}
                              </span>
                            </div>
                          </div>
                          
                          {/* Actions */}
                          <div className="flex gap-3 mt-5 pt-5 border-t border-white/30 relative z-10 pl-3">
                            {post.hasCadreBreakdown && post.vacancies[selectedCategory] > 0 ? (
                              <button 
                                onClick={() => setSelectedPost(post.id)}
                                className="flex-1 bg-white/60 backdrop-blur-md hover:bg-white/80 text-slate-700 font-medium py-2.5 rounded-2xl text-sm transition-all border border-white/80 shadow-apple-glass flex items-center justify-center gap-2"
                              >
                                <i className="fa-solid fa-map-location-dot opacity-50"></i> Zone Breakup
                              </button>
                            ) : (
                              <div className="flex-1"></div> 
                            )}
                            
                            <button 
                              onClick={() => isAdded ? removeFromPreferences(post.id) : addToPreferences(post)}
                              className={`flex-1 font-medium py-2.5 rounded-2xl text-sm transition-all flex items-center justify-center gap-2 transform active:scale-95 border ${
                                isAdded 
                                  ? 'bg-white/60 backdrop-blur-md text-rose-500 hover:bg-rose-50/80 border-white/80 shadow-apple-glass' 
                                  : 'bg-blue-500/90 backdrop-blur-md text-white hover:bg-blue-600/90 shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_8px_20px_rgba(59,130,246,0.3)] border-white/20'
                              }`}
                            >
                              {isAdded ? (
                                <><i className="fa-solid fa-minus opacity-80"></i> Remove</>
                              ) : (
                                <><i className="fa-solid fa-plus opacity-80"></i> Add to List</>
                              )}
                            </button>
                          </div>
                        </div>
                      );
                    })}
                    
                    {filteredPosts.length === 0 && (
                      <div className="col-span-full py-16 text-center text-slate-500 bg-white/50 backdrop-blur-2xl backdrop-saturate-150 rounded-[2rem] shadow-apple-glass border border-white/80 flex flex-col items-center justify-center">
                        <div className="w-20 h-20 bg-white/60 rounded-2xl flex items-center justify-center mb-4 shadow-apple-inset border border-white/80">
                          <i className="fa-solid fa-magnifying-glass text-3xl text-slate-400"></i>
                        </div>
                        <h3 className="text-lg font-semibold text-slate-800 mb-1">No matches found</h3>
                        <p className="text-sm">Try adjusting your filters to see more posts.</p>
                        <button onClick={() => {setJobTypeFilter('All'); setPayLevelFilter('All'); setLocationFilter('All'); setCptFilter('All'); setAgeFilter('All'); setColorBlindFilter('All');}} className="mt-5 bg-white/80 border border-white/80 text-slate-700 font-medium px-5 py-2.5 rounded-xl shadow-apple-glass hover:bg-white transition-all">Reset All Filters</button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* PREFERENCE LIST TAB */}
            {activeTab === 'preferences' && (
              <div className="max-w-4xl mx-auto">
                <div className="bg-white/50 backdrop-blur-2xl backdrop-saturate-150 rounded-[2rem] shadow-apple-glass border border-white/80 overflow-hidden">
                  <div className="bg-white/40 border-b border-white/50 p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                      <h2 className="text-2xl font-bold text-slate-800 tracking-tight">Your Preference List</h2>
                      <p className="text-sm text-slate-500 mt-1 font-medium">Order your selected posts carefully. Top post is highest preference. <span className="inline-block bg-emerald-100/60 text-emerald-700 text-[10px] px-2 py-0.5 rounded-lg font-semibold ml-1 uppercase tracking-wider border border-emerald-200/50 shadow-sm"><i className="fa-solid fa-cloud-arrow-up mr-1"></i>Auto-saved</span></p>
                    </div>
                    
                    {/* Submission / Copy Controls */}
                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full sm:w-auto mt-2 sm:mt-0">
                      
                      <form onSubmit={handleSubmission} className="flex gap-2 w-full sm:w-auto">
                        <input 
                          type="text" 
                          placeholder="Your Name" 
                          required
                          value={userName}
                          onChange={(e) => setUserName(e.target.value)}
                          className="bg-white/60 border border-white/80 shadow-apple-inset rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 w-full sm:w-40 text-slate-800 placeholder-slate-400"
                        />
                        <button 
                          type="submit"
                          disabled={isSubmitting}
                          className="flex items-center justify-center gap-2 bg-blue-500/90 backdrop-blur-md text-white hover:bg-blue-600/90 px-5 py-2.5 rounded-xl text-sm font-medium shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_8px_20px_rgba(59,130,246,0.3)] transition-all transform active:scale-95 border border-white/20 whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                          {isSubmitting ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-paper-plane opacity-80"></i>} 
                          {isSubmitting ? 'Sending...' : 'Submit Data'}
                        </button>
                      </form>

                      <button 
                        onClick={copyToClipboard}
                        className="flex items-center justify-center gap-2 bg-slate-800/90 backdrop-blur-md text-white hover:bg-slate-900/90 px-4 py-2.5 rounded-xl text-sm font-medium shadow-[inset_0_1px_1px_rgba(255,255,255,0.3),0_8px_20px_rgba(0,0,0,0.1)] transition-all transform active:scale-95 border border-white/10 whitespace-nowrap"
                      >
                        <i className="fa-regular fa-copy opacity-80"></i> Copy List
                      </button>
                    </div>
                  </div>

                  {/* Submission Status Message */}
                  {submitMessage && (
                    <div className={`px-6 py-3 border-b border-white/50 text-sm font-medium flex items-center justify-between ${submitMessage.includes('Success') ? 'bg-emerald-50/80 text-emerald-800' : 'bg-rose-50/80 text-rose-800'}`}>
                      <span>{submitMessage}</span>
                      <button onClick={() => setSubmitMessage('')} className="opacity-50 hover:opacity-100"><i className="fa-solid fa-times"></i></button>
                    </div>
                  )}

                  <div className="p-6">
                    {preferences.length === 0 ? (
                      <div className="text-center py-16 flex flex-col items-center">
                        <div className="inline-flex items-center justify-center w-24 h-24 rounded-3xl bg-white/60 backdrop-blur-md border border-white/80 shadow-apple-inset mb-6">
                          <i className="fa-solid fa-list-check text-4xl text-blue-500 opacity-80"></i>
                        </div>
                        <h3 className="text-xl font-semibold text-slate-800 mb-2">Your list is empty</h3>
                        <p className="text-slate-500 font-medium max-w-sm mx-auto mb-8">Go back to the Browse tab and add posts you are interested in applying for.</p>
                        <button 
                          onClick={() => setActiveTab('browse')}
                          className="bg-blue-500/90 backdrop-blur-md border border-white/20 text-white px-8 py-3 rounded-2xl font-medium hover:bg-blue-600/90 shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),0_8px_20px_rgba(59,130,246,0.3)] transition-all transform active:scale-95"
                        >
                          <i className="fa-solid fa-layer-group mr-2 opacity-80"></i> Browse Posts
                        </button>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        <div className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest mb-4 px-2 flex items-center gap-2 bg-white/40 backdrop-blur-md py-2 rounded-xl border border-white/60 justify-center shadow-apple-inset">
                          <i className="fa-solid fa-hand-pointer text-blue-500 opacity-80"></i> Drag and drop rows to set your exact priority order
                        </div>
                        
                        {preferences.map((post, index) => {
                          const theme = getJobTypeTheme(post.jobType);
                          const deptIcon = getDeptIcon(post.department);
                          
                          return (
                            <div 
                              key={post.id} 
                              draggable
                              onDragStart={(e) => (dragItem.current = index)}
                              onDragEnter={(e) => (dragOverItem.current = index)}
                              onDragEnd={handleSort}
                              onDragOver={(e) => e.preventDefault()}
                              className={`flex items-center gap-4 p-4 ${theme.bg} border ${theme.border} rounded-[1.5rem] hover:shadow-apple-glass transition-all group relative overflow-hidden cursor-grab active:cursor-grabbing border-l-[6px] ${theme.border.replace('border-', 'border-l-')} ${theme.indicator.replace('bg-', 'border-l-')}`}
                            >
                              <div className="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-white/0 via-white to-white/0 opacity-60"></div>

                              <div className="flex-shrink-0 flex items-center gap-3 relative z-10 w-16">
                                <i className="fa-solid fa-grip-vertical text-slate-400 group-hover:text-slate-600 cursor-grab px-1 transition-colors"></i>
                                <div className="w-8 h-8 rounded-full bg-white/80 text-slate-700 font-bold text-sm shadow-apple-inset flex items-center justify-center border border-white/60">
                                  {index + 1}
                                </div>
                              </div>
                              
                              <div className={`hidden sm:flex flex-shrink-0 w-12 h-12 rounded-xl items-center justify-center ${theme.badgeBg} ${theme.accent} relative z-10`}>
                                <i className={`fa-solid ${deptIcon} text-lg opacity-80`}></i>
                              </div>

                              <div className="flex-grow relative z-10 pr-4">
                                <h4 className="font-semibold text-slate-800 text-base mb-1">
                                  <span className="text-blue-500 font-bold mr-2 text-xs tracking-wider">[{post.postCode}]</span>
                                  {post.name}
                                </h4>
                                <div className="flex flex-wrap items-center gap-y-1 gap-x-3 text-xs font-medium text-slate-500">
                                  <span className="flex items-center gap-1.5"><i className={`fa-solid ${deptIcon} opacity-40`}></i> {post.department}</span>
                                  <span className="w-1 h-1 rounded-full bg-slate-300"></span>
                                  <span>Level {post.payLevel}</span>
                                  <span className="w-1 h-1 rounded-full bg-slate-300"></span>
                                  <span className={theme.badgeText}>{post.jobType}</span>
                                  
                                  {(post.colorBlindSuitable === 'NO' || post.hasPhysical) && <span className="w-1 h-1 rounded-full bg-slate-300 ml-1"></span>}
                                  
                                  {post.colorBlindSuitable === 'NO' && 
                                    <span className="text-rose-700 font-semibold bg-rose-50/80 px-1.5 py-0.5 rounded-md border border-rose-200/50 ml-1 shadow-sm">Not for CB</span>
                                  }
                                  {post.hasPhysical && 
                                    <span className="text-amber-700 font-semibold bg-amber-50/80 px-1.5 py-0.5 rounded-md border border-amber-200/50 ml-1 shadow-sm">Physical Std</span>
                                  }
                                </div>
                              </div>
                              
                              <div className="flex items-center gap-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity relative z-10">
                                <div className="flex flex-col gap-1 mr-2 bg-white/50 backdrop-blur-md rounded-xl border border-white/80 p-1 shadow-apple-inset">
                                  <button 
                                    onClick={() => movePreference(index, 'up')}
                                    disabled={index === 0}
                                    className="p-1 w-7 h-7 flex items-center justify-center text-slate-500 hover:text-blue-600 hover:bg-white/80 rounded-lg disabled:opacity-30 disabled:hover:bg-transparent disabled:hover:text-slate-500 transition-colors shadow-sm"
                                  >
                                    <i className="fa-solid fa-chevron-up text-xs"></i>
                                  </button>
                                  <button 
                                    onClick={() => movePreference(index, 'down')}
                                    disabled={index === preferences.length - 1}
                                    className="p-1 w-7 h-7 flex items-center justify-center text-slate-500 hover:text-blue-600 hover:bg-white/80 rounded-lg disabled:opacity-30 disabled:hover:bg-transparent disabled:hover:text-slate-500 transition-colors shadow-sm"
                                  >
                                    <i className="fa-solid fa-chevron-down text-xs"></i>
                                  </button>
                                </div>
                                <button 
                                  onClick={() => removeFromPreferences(post.id)}
                                  className="w-10 h-10 flex items-center justify-center bg-white/60 backdrop-blur-md text-rose-500 hover:text-rose-700 hover:bg-white rounded-xl transition-colors border border-white/80 shadow-apple-glass"
                                  title="Remove from list"
                                >
                                  <i className="fa-solid fa-trash-can opacity-80"></i>
                                </button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>
                
                {preferences.length > 0 && (
                  <div className="mt-8 bg-gradient-to-r from-blue-50/80 to-white/50 backdrop-blur-xl rounded-[2rem] p-6 border border-white/80 shadow-apple-glass flex items-start gap-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-2 h-full bg-blue-400"></div>
                    <div className="w-10 h-10 rounded-xl bg-white/80 shadow-apple-inset flex items-center justify-center flex-shrink-0 text-blue-500 border border-white">
                      <i className="fa-solid fa-lightbulb text-lg"></i>
                    </div>
                    <div className="text-sm text-slate-700 leading-relaxed font-medium">
                      <p className="font-semibold text-slate-800 text-base mb-1">Pro Tip for Preference Filling</p>
                      <p>Always fill higher grade pay (Level 7) posts first unless you have a strict geographical constraint (e.g., you only want your home state and are willing to take a Level 4/5 post to get it). Pay close attention to the <strong className="text-rose-600 bg-white/80 px-1.5 py-0.5 rounded shadow-sm border border-white">Not for CB</strong> tag if you are color blind, as those allocations will be cancelled if you fail the medical.</p>
                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* FOOTER */}
          <footer className="relative z-10 bg-white/30 backdrop-blur-xl text-slate-500 py-10 text-center text-sm border-t border-white/40 mt-auto shadow-[0_-4px_20px_-2px_rgba(0,0,0,0.02)]">
            <p className="flex items-center justify-center gap-2 font-medium">
              Designed & Developed with <i className="fa-solid fa-heart text-rose-400"></i> by <span className="text-slate-800 font-semibold tracking-wide">Abhishek Jorwal</span>
            </p>
            <p className="mt-3 text-xs opacity-80 max-w-lg mx-auto leading-relaxed">This tool is designed to assist all SSC CGL candidates in organizing their preferences. Data is sourced from official SSC vacancy PDFs. Always cross-check final choices with official SSC documentation.</p>
          </footer>

          {/* MODAL FOR STATE-WISE BREAKDOWN */}
          {selectedPost && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4 transition-opacity">
              <div className="bg-white/80 backdrop-blur-2xl backdrop-saturate-150 rounded-[2rem] shadow-apple-glass border border-white/80 w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
                
                {/* Modal Header */}
                <div className="px-6 py-5 border-b border-white/50 flex justify-between items-center bg-white/40">
                  <div className="flex items-center gap-4">
                    <div className={`w-12 h-12 rounded-xl flex items-center justify-center shadow-apple-inset border border-white/80 ${getJobTypeTheme(postsData.find(p => p.id === selectedPost)?.jobType).badgeBg} ${getJobTypeTheme(postsData.find(p => p.id === selectedPost)?.jobType).accent}`}>
                      <i className={`fa-solid ${getDeptIcon(postsData.find(p => p.id === selectedPost)?.department || '')} text-xl`}></i>
                    </div>
                    <div>
                      <h3 className="text-xl font-bold text-slate-800 leading-tight">
                        {postsData.find(p => p.id === selectedPost)?.name}
                      </h3>
                      <p className="text-sm font-semibold text-slate-600 mt-0.5">State/Zone Breakup</p>
                    </div>
                  </div>
                  <button 
                    onClick={() => setSelectedPost(null)}
                    className="w-10 h-10 flex items-center justify-center text-slate-500 bg-white/50 hover:bg-white/80 rounded-full transition-colors shadow-sm border border-white/60"
                  >
                    <i className="fa-solid fa-times text-lg"></i>
                  </button>
                </div>

                {/* Modal Controls */}
                <div className="px-6 py-3 border-b border-white/40 bg-white/20 flex justify-between items-center">
                  <span className="text-[11px] font-bold text-slate-600 uppercase tracking-wider flex items-center gap-2">
                    <i className="fa-solid fa-sort"></i> Sort Data By
                  </span>
                  <select 
                    value={cadreSortType}
                    onChange={(e) => setCadreSortType(e.target.value)}
                    className="text-sm border border-white/60 rounded-xl py-1.5 pl-3 pr-8 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white/60 backdrop-blur-md shadow-sm font-medium text-slate-700 outline-none cursor-pointer"
                  >
                    <option value="vacancies">High to Low Vacancies</option>
                    <option value="northToSouth">North to South (Geography)</option>
                    <option value="alphabetical">Alphabetical (A-Z)</option>
                  </select>
                </div>

                {/* Modal Content - Table */}
                <div className="p-0 overflow-y-auto flex-grow bg-white/10">
                  <table className="w-full text-left text-sm text-slate-700 border-collapse">
                    <thead className="bg-white/40 backdrop-blur-md text-slate-600 text-[11px] uppercase tracking-wider font-bold sticky top-0 z-10 shadow-sm border-b border-white/50">
                      <tr>
                        <th className="px-6 py-4">Zone / Cadre Location</th>
                        <th className="px-6 py-4 text-right">{selectedCategory === 'Total' ? 'Total' : selectedCategory} Vacancies</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-white/30">
                      {getSortedCadres(selectedPost).length > 0 ? (
                        getSortedCadres(selectedPost).map((cadre, idx) => (
                          <tr key={idx} className="hover:bg-white/40 transition-colors group">
                            <td className="px-6 py-3.5 font-semibold text-slate-700">
                              <span className="flex items-center gap-2">
                                <i className="fa-solid fa-map-pin text-slate-400 group-hover:text-blue-500 transition-colors text-xs"></i>
                                {cadre.name}
                              </span>
                              {cadreSortType === 'northToSouth' && (
                                <span className="ml-5 mt-1 block text-[10px] text-blue-700 bg-blue-50/80 px-2 py-0.5 rounded border border-blue-200/50 font-bold max-w-max shadow-sm">
                                  Geographical Rank: {northToSouthOrder[cadre.name] || '-'}
                                </span>
                              )}
                            </td>
                            <td className="px-6 py-3.5 text-right font-black text-slate-800 text-base">
                              {cadre.count}
                            </td>
                          </tr>
                        ))
                      ) : (
                        <tr>
                          <td colSpan="2" className="px-6 py-12 text-center">
                            <div className="w-16 h-16 bg-white/50 rounded-full flex items-center justify-center mx-auto mb-3 shadow-apple-inset border border-white">
                              <i className="fa-regular fa-folder-open text-2xl text-slate-400"></i>
                            </div>
                            <p className="text-slate-600 font-medium">No zone-wise breakdown available for this post.</p>
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
                
                {/* Modal Footer */}
                <div className="px-6 py-4 border-t border-white/50 bg-white/30 backdrop-blur-md flex justify-end">
                  <button 
                    onClick={() => setSelectedPost(null)}
                    className="bg-slate-800/90 backdrop-blur-md text-white border border-white/20 px-6 py-2.5 rounded-xl font-semibold hover:bg-slate-900 shadow-md transition-all active:scale-95"
                  >
                    Close Window
                  </button>
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
